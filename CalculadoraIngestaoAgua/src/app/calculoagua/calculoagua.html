<div class="container">
    <h1><strong>Calculadora de Ingestão Diária de Água</strong></h1>

    <p>Peso:</p>
    <input type="number" [(ngModel)]="peso" placeholder="Peso Ex:75">

    <p>Digite um nível de atividade:</p>
    <h3>Sedentário (1.0)<br>
        Moderado (1.2)<br>
        Intenso (1.5)</h3>
    <input type="number" [(ngModel)]="nivelAtividade" placeholder="Nivel Ex:1.2">

    <button (click)="calcularIngestao()">Enviar</button>

    <div>
        <p>Situação: <strong>{{ resultado }}</strong></p>
    </div>
</div>
