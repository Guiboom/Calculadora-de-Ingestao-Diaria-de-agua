<div class="container">
    <h1><strong>Calculadora de Ingestão Diária de Água</strong></h1>

    <p>Peso:</p>
    <input type="number" [(ngModel)]="peso" placeholder="Peso Ex:75">

    <p>Selecione um nível de atividade:</p>
    <div class="selecaoBotoes">
        <button (click)="nivelAtividade = 1.0">Sedentário</button>
        <button (click)="nivelAtividade = 1.2">Moderado</button>
        <button (click)="nivelAtividade = 1.5">Intenso</button>
    </div>

    <button id="enviar" (click)="calcularIngestao()">Enviar</button>

    <div class="resultado" *ngIf="resultado">
        <h3><strong>{{ resultado }}</strong></h3>
        <h2><strong>{{ aviso }}</strong></h2>
    </div>
</div>
